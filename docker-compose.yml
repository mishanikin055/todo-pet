services:
  backend:
    build: ./todo-app-backend
    container_name: backend
    env_file:
      - .env
    depends_on:
      - db
  db:
    image: postgres:18-alpine
    container_name: pg_container
    environment:                    
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes: 
      - pg_data:/var/lib/postgresql
  frontend:
    build: 
      context: ./todo-app-frontend
      target: production
    container_name: frontend           
    depends_on:                   
      - backend
  proxy:
    image: nginx:alpine
    container_name: main_proxy
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  pg_data: